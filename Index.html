<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>L98-59d — THE LAVA WORLD</title>
<meta name="description" content="You are 35 light-years from home. Welcome to L98-59d.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --fire:#FF3D00;
  --ember:#FF7043;
  --gold:#FFB347;
  --deep:#0A0000;
  --magma:#1A0300;
  --crust:#2D0A00;
  --void:#000000;
  --pale:#FFE8D6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--void);
  color: var(--pale);
  font-family: 'EB Garamond', serif;
}

/* Custom cursor only on desktop */
@media (pointer: fine) {
  body { cursor: none; }
}
@media (pointer: coarse) {
  #cur, #cur2 { display: none; }
}

#cur {
  position: fixed;
  width: 8px;
  height: 8px;
  background: var(--fire);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px var(--fire);
  mix-blend-mode: screen;
}

#cur2 {
  position: fixed;
  width: 28px;
  height: 28px;
  border: 1px solid rgba(255, 61, 0, 0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
}

/* CANVAS */
#c {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* STARS */
#stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--dur) ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: var(--lo); }
  50% { opacity: var(--hi); }
}

/* VIGNETTE */
#vignette {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.98) 100%);
}

/* HEAT LINES */
#heat {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,100,0,0.015) 2px, rgba(255,100,0,0.015) 4px);
  animation: scan 10s linear infinite;
}
@keyframes scan {
  0% { background-position: 0 0; }
  100% { background-position: 0 100vh; }
}

/* GRAIN */
#grain {
  position: fixed;
  inset: 0;
  z-index: 97;
  pointer-events: none;
  opacity: 0.06;
  background-image: repeating-radial-gradient(circle at 0 0, transparent 0, rgba(255,255,255,0.08) 1px, transparent 2px);
  mix-blend-mode: soft-light;
  animation: grainMove 8s steps(2) infinite;
}
@keyframes grainMove {
  0% { background-position: 0 0; }
  100% { background-position: 100px 100px; }
}

/* GLITCH */
#glitch {
  position: fixed;
  inset: 0;
  z-index: 98;
  pointer-events: none;
  background: transparent;
  mix-blend-mode: overlay;
  opacity: 0;
  transition: opacity 0.05s;
}

/* MOUSE LIGHT */
#mouse-light {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 4;
  background: radial-gradient(circle 120px at var(--mx, 50%) var(--my, 50%), rgba(255, 90, 0, 0.06), transparent 70%);
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
  transition: opacity 1.5s ease;
}
#intro.gone {
  opacity: 0;
  pointer-events: none;
}
.i-coords {
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.25em;
  color: rgba(255,112,67,0.4);
  margin-bottom: 48px;
  animation: fadeInUp 2s ease 0.5s both;
}
.i-orb {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #FF7043, #FF3D00 40%, #8B0000 75%, #1A0000);
  box-shadow: 0 0 40px rgba(255,61,0,0.3), inset -8px -8px 20px rgba(0,0,0,0.6);
  margin-bottom: 48px;
  animation: orbPulse 4s ease-in-out infinite, fadeInUp 1.5s ease both;
}
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(255,61,0,0.3), inset -8px -8px 20px rgba(0,0,0,0.6); }
  50% { box-shadow: 0 0 70px rgba(255,61,0,0.55), inset -8px -8px 20px rgba(0,0,0,0.6); }
}
.i-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(26px, 5vw, 50px);
  letter-spacing: 0.18em;
  color: var(--pale);
  margin-bottom: 14px;
  animation: fadeInUp 2s ease 0.8s both;
}
.i-sub {
  font-style: italic;
  font-size: 15px;
  color: rgba(255,232,214,0.35);
  letter-spacing: 0.12em;
  margin-bottom: 64px;
  animation: fadeInUp 2s ease 1.2s both;
}
.i-btn {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--fire);
  padding: 14px 44px;
  border: 1px solid rgba(255,61,0,0.4);
  background: transparent;
  cursor: pointer;
  transition: all 0.3s;
  animation: fadeInUp 2s ease 2s both, borderPulse 3s ease-in-out 2s infinite;
  position: relative;
  overflow: hidden;
}
.i-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--fire);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}
.i-btn:hover::before {
  transform: scaleX(1);
}
.i-btn:hover {
  color: #000;
}
.i-btn span {
  position: relative;
  z-index: 1;
}
@keyframes borderPulse {
  0%, 100% { border-color: rgba(255,61,0,0.4); }
  50% { border-color: rgba(255,61,0,0.9); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* WORLD */
#world {
  position: fixed;
  inset: 0;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
  overflow: hidden;
}
#world.on {
  opacity: 1;
  pointer-events: all;
}

/* NAV */
#nav {
  position: absolute;
  top: 32px;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  justify-content: space-between;
  padding: 0 48px;
  opacity: 0;
  transform: translateY(-12px);
  transition: opacity 1.2s ease 1s, transform 1.2s ease 1s;
}
#world.on #nav {
  opacity: 1;
  transform: none;
}
.n-logo {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: rgba(255,232,214,0.6);
}
.n-logo em {
  color: var(--fire);
  font-style: normal;
}
.n-links {
  display: flex;
  gap: 28px;
  list-style: none;
}
.n-links a {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(255,232,214,0.3);
  text-decoration: none;
  transition: color 0.3s;
  cursor: pointer;
}
.n-links a:hover {
  color: rgba(255,112,67,0.9);
}

/* HERO */
#hero {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  width: 100%;
  opacity: 0;
  transition: opacity 1.5s ease 1.5s;
  pointer-events: none;
}
#world.on #hero {
  opacity: 1;
}
.hero-kick {
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.22em;
  color: rgba(255,112,67,0.45);
  margin-bottom: 18px;
  display: block;
}
.hero-h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(46px, 9vw, 108px);
  line-height: 0.9;
  letter-spacing: 0.1em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,232,214,0.12);
  text-shadow: 0 0 80px rgba(255,61,0,0.35);
  margin-bottom: 6px;
}
.hero-h1 b {
  display: block;
  -webkit-text-stroke: 1px rgba(255,61,0,0.55);
  color: transparent;
}
.hero-h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 2vw, 18px);
  letter-spacing: 0.5em;
  color: rgba(255,112,67,0.55);
  display: block;
}

/* CHIPS */
.chip {
  position: absolute;
  z-index: 30;
  font-style: italic;
  font-size: 12px;
  color: rgba(255,232,214,0.3);
  border-left: 1px solid rgba(255,61,0,0.18);
  padding: 4px 0 4px 12px;
  pointer-events: none;
  animation: floatChip var(--cf,6s) ease-in-out infinite;
}
@keyframes floatChip {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(var(--cy,-8px)); }
}
.chip strong {
  display: block;
  font-family: 'Cinzel', serif;
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(255,112,67,0.45);
}

/* SCROLL HINT */
#scrollHint {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease 3s;
}
#world.on #scrollHint {
  opacity: 1;
}
.scrollText {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(255,112,67,0.3);
  display: block;
  margin-bottom: 10px;
}
.scrollBar {
  width: 1px;
  height: 44px;
  margin: 0 auto;
  background: linear-gradient(var(--fire), transparent);
  animation: scrollAnim 2.5s ease-in-out infinite;
}
@keyframes scrollAnim {
  0% { transform: scaleY(0); transform-origin: top; opacity: 0; }
  40% { opacity: 1; }
  100% { transform: scaleY(1); transform-origin: bottom; opacity: 0; }
}

/* PORTAL BUTTON */
#portalBtn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 55;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255,61,0,0.4);
  background: transparent;
  border: 1px solid rgba(255,61,0,0.2);
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 1s ease 3s, color 0.3s, border-color 0.3s;
}
#world.on #portalBtn {
  opacity: 1;
}
#portalBtn:hover {
  color: var(--fire);
  border-color: rgba(255,61,0,0.6);
}

/* PAGES */
#pages {
  position: absolute;
  inset: 0;
  z-index: 15;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-snap-type: y proximity;
  scrollbar-width: none;
}
#pages::-webkit-scrollbar {
  display: none;
}
.page {
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.page.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* PAGE 2 */
#page2 {
  background: linear-gradient(180deg, transparent, rgba(10,2,0,0.92) 35%, rgba(18,3,0,0.97));
}
.page2-content {
  max-width: 680px;
  text-align: center;
  padding: 0 40px;
}
.page2-label {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255,61,0,0.35);
  margin-bottom: 22px;
  display: block;
}
.page2-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 4.5vw, 56px);
  letter-spacing: 0.1em;
  line-height: 1.1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,112,67,0.18);
  margin-bottom: 28px;
}
.page2-text {
  font-size: clamp(15px, 1.8vw, 19px);
  font-style: italic;
  line-height: 1.9;
  color: rgba(255,232,214,0.4);
  max-width: 520px;
  margin: 0 auto 36px;
}
.page2-stats {
  display: flex;
  justify-content: center;
  gap: 44px;
}
.stat {
  text-align: center;
}
.stat-number {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: rgba(255,112,67,0.65);
  display: block;
}
.stat-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255,232,214,0.2);
  font-family: 'Cinzel', serif;
}

/* PAGE 3 */
#page3 {
  background: linear-gradient(180deg, rgba(18,3,0,0.97), rgba(28,5,0,1) 50%, rgba(12,2,0,1));
}
.page3-grid {
  max-width: 880px;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0 44px;
  align-items: center;
}
.page3-divider {
  background: linear-gradient(transparent, rgba(255,61,0,0.25), transparent);
  height: 280px;
}
.page3-left { text-align: right; }
.page3-right { text-align: left; }
.page3-ey {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(255,61,0,0.3);
  display: block;
  margin-bottom: 14px;
}
.page3-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 3vw, 36px);
  letter-spacing: 0.1em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,112,67,0.22);
  margin-bottom: 18px;
}
.page3-text {
  font-size: 14px;
  font-style: italic;
  line-height: 1.85;
  color: rgba(255,232,214,0.32);
}
.quote {
  margin-top: 24px;
  padding: 18px 22px;
  border: 1px solid rgba(255,61,0,0.08);
  background: rgba(255,61,0,0.02);
}
.quote p {
  font-size: 15px;
  font-style: italic;
  color: rgba(255,232,214,0.45);
  line-height: 1.7;
  margin-bottom: 10px;
}
.quote cite {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255,112,67,0.35);
  font-style: normal;
}

/* PAGE 4 RELICS */
#page4 {
  background: #080100;
  align-items: flex-start;
  padding-top: 72px;
}
.relics-container {
  width: 100%;
  max-width: 1100px;
  padding: 0 44px 72px;
}
.relics-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(255,61,0,0.07);
  padding-bottom: 18px;
}
.relics-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255,61,0,0.3);
}
.relics-sub {
  font-style: italic;
  font-size: 12px;
  color: rgba(255,232,214,0.18);
}
.relics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255,61,0,0.05);
}
.relic {
  background: rgba(4,0,0,0.95);
  padding: 24px 20px;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid transparent;
}
.relic:hover {
  background: rgba(14,3,0,0.98);
  border-color: rgba(255,61,0,0.1);
}
.relic:hover .relic-cta {
  color: var(--fire);
  border-color: rgba(255,61,0,0.45);
}
.relic-num {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255,61,0,0.18);
  margin-bottom: 18px;
  display: block;
}
.relic-visual {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
}
.relic-name {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255,232,214,0.55);
  margin-bottom: 7px;
}
.relic-lore {
  font-size: 12px;
  font-style: italic;
  line-height: 1.55;
  color: rgba(255,232,214,0.18);
  margin-bottom: 14px;
}
.relic-cta {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(255,61,0,0.35);
  border: 1px solid rgba(255,61,0,0.12);
  padding: 6px 14px;
  transition: all 0.25s;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 200;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}
.modal-content {
  max-width: 480px;
  padding: 40px 36px;
  border: 1px solid rgba(255,61,0,0.4);
  background: #050000;
  text-align: center;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.modal-content p {
  font-style: italic;
  color: rgba(255,232,214,0.7);
  line-height: 1.7;
  margin-bottom: 28px;
  font-size: 16px;
}
.modal-close {
  background: transparent;
  border: 1px solid rgba(255,61,0,0.4);
  color: #ff7043;
  padding: 10px 28px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.3s;
}
.modal-close:hover {
  background: rgba(255,61,0,0.2);
  border-color: #ff7043;
}
.modal-acquire {
  margin-left: 12px;
  background: rgba(255,61,0,0.2);
}
.modal-acquire:hover {
  background: #ff7043;
  color: #000;
}

/* PAGE 5 SCIENCE */
#page5 {
  background: #050000;
}
.science-container {
  max-width: 1000px;
  padding: 0 48px;
  text-align: center;
}
.science-ey {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.35em;
  color: rgba(255,61,0,0.28);
  margin-bottom: 28px;
  display: block;
}
.science-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 4vw, 46px);
  -webkit-text-stroke: 1px rgba(255,112,67,0.13);
  color: transparent;
  letter-spacing: 0.12em;
  margin-bottom: 48px;
}
.science-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.science-card {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,61,0,0.15);
  padding: 28px 24px;
  transition: all 0.3s;
}
.science-card:hover {
  border-color: rgba(255,61,0,0.4);
  background: rgba(0,0,0,0.7);
}
.science-card-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.25em;
  color: rgba(255,112,67,0.7);
  margin-bottom: 20px;
  display: block;
}
.science-card-content {
  font-style: italic;
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,232,214,0.45);
  text-align: left;
}
.science-card-content ul {
  list-style: none;
  padding-left: 0;
}
.science-card-content li {
  margin-bottom: 12px;
  padding-left: 16px;
  border-left: 1px solid rgba(255,61,0,0.2);
}

/* PAGE 6 SIGNAL */
#page6 {
  background: #050000;
}
.signal-container {
  max-width: 600px;
  padding: 0 48px;
  text-align: center;
}
.signal-ey {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.35em;
  color: rgba(255,61,0,0.28);
  margin-bottom: 28px;
  display: block;
}
.signal-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 4vw, 46px);
  -webkit-text-stroke: 1px rgba(255,112,67,0.13);
  color: transparent;
  letter-spacing: 0.12em;
  margin-bottom: 20px;
}
.signal-text {
  font-style: italic;
  font-size: 15px;
  line-height: 1.85;
  color: rgba(255,232,214,0.28);
  margin-bottom: 36px;
}
.signal-form {
  display: flex;
  border: 1px solid rgba(255,61,0,0.13);
  max-width: 400px;
  margin: 0 auto;
}
.signal-input {
  flex: 1;
  padding: 13px 16px;
  background: transparent;
  border: none;
  outline: none;
  color: rgba(255,232,214,0.65);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 14px;
}
.signal-input::placeholder {
  color: rgba(255,232,214,0.18);
}
.signal-btn {
  padding: 13px 22px;
  border: none;
  background: rgba(255,61,0,0.08);
  color: rgba(255,112,67,0.5);
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.22em;
  cursor: pointer;
  transition: all 0.2s;
}
.signal-btn:hover {
  background: var(--fire);
  color: #000;
}

/* PAGE 7 END */
#page7 {
  background: linear-gradient(180deg, #050000, #000);
}
.end-container {
  text-align: center;
}
.end-c {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: rgba(255,61,0,0.2);
  margin-bottom: 22px;
  display: block;
}
.end-orb {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, rgba(255,112,67,0.35), rgba(139,0,0,0.25) 60%, transparent);
  border: 1px solid rgba(255,61,0,0.08);
  margin: 0 auto 20px;
}
.end-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(11px, 2vw, 16px);
  letter-spacing: 0.4em;
  color: rgba(255,232,214,0.07);
  -webkit-text-stroke: 1px rgba(255,232,214,0.07);
}

/* DEPTH INDICATOR */
#depth {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  opacity: 0;
  transition: opacity 1s ease 2s;
}
#world.on #depth {
  opacity: 1;
}
.depth-dot {
  width: 1px;
  height: 18px;
  background: rgba(255,61,0,0.1);
  transition: all 0.4s;
  cursor: pointer;
}
.depth-dot.active {
  background: rgba(255,61,0,0.55);
  height: 26px;
}
.depth-label {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 0.18em;
  color: rgba(255,61,0,0.2);
  writing-mode: vertical-rl;
  margin-top: 7px;
}

/* PLANET */
#planetWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  pointer-events: none;
}

  width: min(480px, 52vmin);
  height: min(480px, 52vmin);

}
