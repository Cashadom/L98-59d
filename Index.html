<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>L98-59d — THE LAVA WORLD</title>
<meta name="description" content="You are 35 light-years from home. Welcome to L98-59d. An immersive exoplanet experience.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --fire:#FF3D00;
  --ember:#FF7043;
  --gold:#FFB347;
  --deep:#0A0000;
  --magma:#1A0300;
  --crust:#2D0A00;
  --void:#000000;
  --pale:#FFE8D6;
  --ash:#8B4513;
}

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  height: 100%;
}

body {
  background: var(--void);
  color: var(--pale);
  font-family: 'EB Garamond', serif;
  overflow: hidden;
  height: 100vh;
}

/* Custom cursor only on fine pointer (desktop) */
@media (pointer: fine) {
  body {
    cursor: none;
  }
}

@media (pointer: coarse) {
  #cur,
  #cur2 {
    display: none;
  }
}

#cur {
  position: fixed;
  width: 8px;
  height: 8px;
  background: var(--fire);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px var(--fire), 0 0 30px rgba(255, 61, 0, 0.4);
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: screen;
}

#cur2 {
  position: fixed;
  width: 28px;
  height: 28px;
  border: 1px solid rgba(255, 61, 0, 0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
}

/* CANVAS LAVA */
#c {
  position: fixed;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
}

/* STARS */
#stars {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.s {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: tw var(--d) ease-in-out infinite var(--dl);
}

@keyframes tw {
  0%, 100% {
    opacity: var(--lo);
  }
  50% {
    opacity: var(--hi);
  }
}

/* VIGNETTE */
#vig {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.7) 70%, rgba(0, 0, 0, 0.98) 100%);
}

/* HEAT LINES + DISTORTION */
#heat {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 100, 0, 0.012) 2px, rgba(255, 100, 0, 0.012) 4px);
  animation: scan 10s linear infinite;
}

@keyframes scan {
  0% {
    background-position: 0 0;
  }
  100% {
    background-position: 0 100vh;
  }
}

/* HEAT DISTORTION SVG FILTER (subtle) */
.heat-distort {
  filter: url(#heat-distort);
}

/* GRAIN OVERLAY */
#grain {
  position: fixed;
  inset: 0;
  z-index: 97;
  pointer-events: none;
  opacity: 0.06;
  background-image: repeating-radial-gradient(circle at 0 0, transparent 0, rgba(255, 255, 255, 0.08) 1px, transparent 2px);
  mix-blend-mode: soft-light;
  animation: grainMove 8s steps(2) infinite;
}

@keyframes grainMove {
  0% {
    background-position: 0 0;
  }
  100% {
    background-position: 100px 100px;
  }
}

/* GLITCH OVERLAY */
#glitch {
  position: fixed;
  inset: 0;
  z-index: 98;
  pointer-events: none;
  background: rgba(255, 0, 0, 0);
  mix-blend-mode: overlay;
  opacity: 0;
  transition: opacity 0.1s;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--void);
  transition: opacity 1.5s ease;
}

#intro.gone {
  opacity: 0;
  pointer-events: none;
}

.i-coords {
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.25em;
  color: rgba(255, 112, 67, 0.4);
  margin-bottom: 48px;
  animation: fi 2s ease 0.5s both;
}

.i-orb {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #FF7043 0%, #FF3D00 40%, #8B0000 75%, #1A0000 100%);
  box-shadow: 0 0 40px rgba(255, 61, 0, 0.3), 0 0 120px rgba(255, 61, 0, 0.1), inset -8px -8px 20px rgba(0, 0, 0, 0.6);
  margin-bottom: 48px;
  animation: orb-b 4s ease-in-out infinite, fi 1.5s ease both;
}

@keyframes orb-b {
  0%, 100% {
    box-shadow: 0 0 40px rgba(255, 61, 0, 0.3), 0 0 120px rgba(255, 61, 0, 0.1), inset -8px -8px 20px rgba(0, 0, 0, 0.6);
  }
  50% {
    box-shadow: 0 0 70px rgba(255, 61, 0, 0.55), 0 0 200px rgba(255, 61, 0, 0.2), inset -8px -8px 20px rgba(0, 0, 0, 0.6);
  }
}

.i-name {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(26px, 5vw, 50px);
  letter-spacing: 0.18em;
  color: var(--pale);
  margin-bottom: 14px;
  animation: fi 2s ease 0.8s both;
}

.i-sub {
  font-style: italic;
  font-size: 15px;
  color: rgba(255, 232, 214, 0.35);
  letter-spacing: 0.12em;
  margin-bottom: 64px;
  animation: fi 2s ease 1.2s both;
}

.i-btn {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--fire);
  padding: 14px 44px;
  border: 1px solid rgba(255, 61, 0, 0.4);
  background: transparent;
  cursor: pointer;
  transition: all 0.3s;
  animation: fi 2s ease 2s both, bp 3s ease-in-out 2s infinite;
  position: relative;
  overflow: hidden;
}

.i-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--fire);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.i-btn:hover::before {
  transform: scaleX(1);
}

.i-btn:hover {
  color: var(--void);
}

.i-btn span {
  position: relative;
  z-index: 1;
}

@keyframes bp {
  0%, 100% {
    border-color: rgba(255, 61, 0, 0.4);
  }
  50% {
    border-color: rgba(255, 61, 0, 0.9);
  }
}

@keyframes fi {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* WORLD */
#world {
  position: fixed;
  inset: 0;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 2s ease;
  overflow: hidden;
}

#world.on {
  opacity: 1;
  pointer-events: all;
}

/* NAV */
#nav {
  position: absolute;
  top: 32px;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  opacity: 0;
  transform: translateY(-12px);
  transition: opacity 1.2s ease 1s, transform 1.2s ease 1s;
}

#world.on #nav {
  opacity: 1;
  transform: none;
}

.n-logo {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: rgba(255, 232, 214, 0.6);
}

.n-logo em {
  color: var(--fire);
  font-style: normal;
}

.n-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.n-links a {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(255, 232, 214, 0.3);
  text-decoration: none;
  transition: color 0.3s;
  cursor: pointer;
}

.n-links a:hover {
  color: rgba(255, 112, 67, 0.9);
}

/* HERO TEXT */
#ht {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  width: 100%;
  opacity: 0;
  transition: opacity 1.5s ease 1.5s;
  pointer-events: none;
}

#world.on #ht {
  opacity: 1;
}

.ht-kick {
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.22em;
  color: rgba(255, 112, 67, 0.45);
  margin-bottom: 18px;
  display: block;
}

.ht-h1 {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(46px, 9vw, 108px);
  line-height: 0.9;
  letter-spacing: 0.1em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255, 232, 214, 0.12);
  text-shadow: 0 0 80px rgba(255, 61, 0, 0.35), 0 0 160px rgba(255, 61, 0, 0.12);
  margin-bottom: 6px;
}

.ht-h1 b {
  display: block;
  -webkit-text-stroke: 1px rgba(255, 61, 0, 0.55);
  color: transparent;
}

.ht-h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 2vw, 18px);
  letter-spacing: 0.5em;
  color: rgba(255, 112, 67, 0.55);
  margin-bottom: 48px;
  display: block;
}

/* CHIPS */
.chip {
  position: absolute;
  z-index: 30;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 0.07em;
  color: rgba(255, 232, 214, 0.3);
  border-left: 1px solid rgba(255, 61, 0, 0.18);
  padding: 4px 0 4px 12px;
  pointer-events: none;
  animation: cf var(--cf, 6s) ease-in-out infinite var(--cd, 0s);
}

@keyframes cf {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(var(--cy, -8px));
  }
}

.chip strong {
  display: block;
  font-family: 'Cinzel', serif;
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(255, 112, 67, 0.45);
  margin-bottom: 2px;
}

/* SCROLL HINT */
#sh {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  text-align: center;
  opacity: 0;
  transition: opacity 1s ease 3s;
}

#world.on #sh {
  opacity: 1;
}

.sh-t {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(255, 112, 67, 0.3);
  display: block;
  margin-bottom: 10px;
}

.sh-b {
  width: 1px;
  height: 44px;
  margin: 0 auto;
  background: linear-gradient(var(--fire), transparent);
  animation: sd 2.5s ease-in-out infinite;
}

@keyframes sd {
  0% {
    transform: scaleY(0);
    transform-origin: top;
    opacity: 0;
  }
  40% {
    opacity: 1;
  }
  100% {
    transform: scaleY(1);
    transform-origin: bottom;
    opacity: 0;
  }
}

/* PORTAL BUTTON */
#portal-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 55;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255, 61, 0, 0.4);
  background: transparent;
  border: 1px solid rgba(255, 61, 0, 0.2);
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 1s ease 3s;
}

#world.on #portal-btn {
  opacity: 1;
}

#portal-btn:hover {
  color: var(--fire);
  border-color: rgba(255, 61, 0, 0.6);
  box-shadow: 0 0 12px rgba(255, 61, 0, 0.2);
}

/* PAGES */
#pages {
  position: absolute;
  inset: 0;
  z-index: 15;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-snap-type: y proximity;
  scrollbar-width: none;
}

#pages::-webkit-scrollbar {
  display: none;
}

.page {
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.page.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* PAGE 2 */
#p2 {
  background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(10, 2, 0, 0.92) 35%, rgba(18, 3, 0, 0.97) 100%);
}

.p2i {
  max-width: 680px;
  text-align: center;
  padding: 0 40px;
}

.p2-lbl {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255, 61, 0, 0.35);
  margin-bottom: 22px;
  display: block;
}

.p2-h {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 4.5vw, 56px);
  letter-spacing: 0.1em;
  line-height: 1.1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255, 112, 67, 0.18);
  margin-bottom: 28px;
}

.p2-body {
  font-size: clamp(15px, 1.8vw, 19px);
  font-style: italic;
  line-height: 1.9;
  color: rgba(255, 232, 214, 0.4);
  max-width: 520px;
  margin: 0 auto 36px;
}

.p2-stats {
  display: flex;
  justify-content: center;
  gap: 44px;
  margin-top: 32px;
}

.p2-s {
  text-align: center;
}

.p2-sn {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  color: rgba(255, 112, 67, 0.65);
  letter-spacing: 0.1em;
  display: block;
}

.p2-sl {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255, 232, 214, 0.2);
  font-family: 'Cinzel', serif;
}

/* PAGE 3 */
#p3 {
  background: linear-gradient(180deg, rgba(18, 3, 0, 0.97) 0%, rgba(28, 5, 0, 1) 50%, rgba(12, 2, 0, 1) 100%);
}

.p3i {
  max-width: 880px;
  padding: 0 48px;
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0 44px;
  align-items: center;
}

.p3-div {
  background: linear-gradient(transparent, rgba(255, 61, 0, 0.25), transparent);
  height: 280px;
}

.p3-l {
  text-align: right;
}

.p3-r {
  text-align: left;
}

.p3-ey {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(255, 61, 0, 0.3);
  display: block;
  margin-bottom: 14px;
}

.p3-h {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 3vw, 36px);
  letter-spacing: 0.1em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255, 112, 67, 0.22);
  line-height: 1.1;
  margin-bottom: 18px;
}

.p3-p {
  font-size: 14px;
  font-style: italic;
  line-height: 1.85;
  color: rgba(255, 232, 214, 0.32);
}

.p3-q {
  margin-top: 24px;
  padding: 18px 22px;
  border: 1px solid rgba(255, 61, 0, 0.08);
  background: rgba(255, 61, 0, 0.02);
}

.p3-q p {
  font-size: 15px;
  font-style: italic;
  color: rgba(255, 232, 214, 0.45);
  line-height: 1.7;
  margin-bottom: 10px;
}

.p3-q cite {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255, 112, 67, 0.35);
  font-style: normal;
}

/* PAGE 4 - RELICS */
#p4 {
  background: rgba(8, 1, 0, 1);
  align-items: flex-start;
  padding-top: 72px;
  overflow: hidden;
}

.p4i {
  width: 100%;
  max-width: 1100px;
  padding: 0 44px 72px;
}

.p4-hdr {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(255, 61, 0, 0.07);
  padding-bottom: 18px;
}

.p4-t {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255, 61, 0, 0.3);
}

.p4-s {
  font-style: italic;
  font-size: 12px;
  color: rgba(255, 232, 214, 0.18);
}

.relics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(255, 61, 0, 0.05);
}

.relic {
  background: rgba(4, 0, 0, 0.95);
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: background 0.3s;
  border: 1px solid transparent;
}

.relic::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255, 61, 0, 0.05), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s;
}

.relic:hover {
  background: rgba(14, 3, 0, 0.98);
  border-color: rgba(255, 61, 0, 0.1);
}

.relic:hover::before {
  opacity: 1;
}

.relic:hover .r-cta {
  color: var(--fire);
  border-color: rgba(255, 61, 0, 0.45);
}

.r-num {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(255, 61, 0, 0.18);
  margin-bottom: 18px;
  display: block;
}

.r-vis {
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
}

.r-name {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.08em;
  color: rgba(255, 232, 214, 0.55);
  margin-bottom: 7px;
  line-height: 1.3;
}

.r-lore {
  font-size: 12px;
  font-style: italic;
  line-height: 1.55;
  color: rgba(255, 232, 214, 0.18);
  margin-bottom: 14px;
}

.r-cta {
  display: inline-block;
  margin-top: 10px;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(255, 61, 0, 0.35);
  border: 1px solid rgba(255, 61, 0, 0.12);
  padding: 6px 14px;
  transition: all 0.25s;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.96);
  z-index: 200;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}

.modal-content {
  max-width: 520px;
  padding: 40px 36px;
  border: 1px solid rgba(255, 61, 0, 0.4);
  background: #050000;
  text-align: center;
  animation: modalIn 0.4s ease;
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.modal-content p {
  font-style: italic;
  color: rgba(255, 232, 214, 0.7);
  line-height: 1.7;
  margin-bottom: 28px;
  font-size: 16px;
}

.modal-close {
  background: transparent;
  border: 1px solid rgba(255, 61, 0, 0.4);
  color: #ff7043;
  padding: 10px 28px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.3s;
}

.modal-close:hover {
  background: rgba(255, 61, 0, 0.2);
  border-color: #ff7043;
}

.modal-acquire {
  margin-left: 12px;
  background: rgba(255, 61, 0, 0.2);
  border-color: #ff7043;
  color: #ff7043;
}

.modal-acquire:hover {
  background: #ff7043;
  color: #000;
}

/* PAGE 5 - OBSERVED/INFERRED/IMAGINED */
#p5 {
  background: rgba(5, 0, 0, 1);
}

.p5i {
  max-width: 1000px;
  padding: 0 48px;
  text-align: center;
}

.p5-ey {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 0.35em;
  color: rgba(255, 61, 0, 0.28);
  margin-bottom: 28px;
  display: block;
}

.p5-h {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 4vw, 46px);
  -webkit-text-stroke: 1px rgba(255, 112, 67, 0.13);
  color: transparent;
  letter-spacing: 0.12em;
  line-height: 1.1;
  margin-bottom: 48px;
}

.spectrum-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-top: 32px;
}

.spectrum-card {
  background: rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(255, 61, 0, 0.15);
  padding: 28px 24px;
  transition: all 0.3s;
}

.spectrum-card:hover {
  border-color: rgba(255, 61, 0, 0.4);
  background: rgba(0, 0, 0, 0.7);
}

.spectrum-title {
